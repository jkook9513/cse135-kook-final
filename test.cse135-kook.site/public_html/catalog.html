<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Juniper & Ash — Catalog</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <script src="/assets/app.js" defer></script>
  <script>
    window._cq = window._cq || [];
    _cq.push(['init', {
      endpoint: 'https://collector.cse135-kook.site/log',
      enableVitals: true,
      enableErrors: true,
      sampleRate: 1.0,
      debug: true,
      respectConsent: false,
      detectBots: false
    }]);
  </script>
  <script async src="https://collector.cse135-kook.site/collector.js"></script>
</head>

<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">🛋️</span>
        <div class="brand-text">
          <h1>Catalog</h1>
          <p class="tagline">Filter, search, and add to cart.</p>
        </div>
      </div>

      <div class="top-actions">
        <button class="btn ghost" id="themeToggle" type="button" aria-pressed="false">Toggle theme</button>
        <a class="btn" href="/index.html">Home</a>
        <button class="btn" id="openCart" type="button" aria-haspopup="dialog">
          Cart <span class="badge" id="cartCount">0</span>
        </button>
      </div>
    </div>

    <nav class="nav" aria-label="Primary navigation">
      <a class="nav-link" href="/index.html">Home</a>
      <a class="nav-link active" href="/catalog.html">Catalog</a>
      <a class="nav-link" href="/about.html">About</a>
      <a class="nav-link" href="/contact.html">Contact</a>
    </nav>
  </header>

  <main id="main" class="container">
    <section class="card">
      <h2>Browse</h2>

      <div class="filters">
        <label class="field">
          <span>Search</span>
          <input id="searchInput" type="text" placeholder="Try: sofa, oak, walnut, desk…" autocomplete="off" />
        </label>

        <label class="field">
          <span>Category</span>
          <select id="categorySelect">
            <option value="all">All</option>
            <option value="seating">Seating</option>
            <option value="tables">Tables</option>
            <option value="storage">Storage</option>
            <option value="desks">Desks</option>
          </select>
        </label>

        <label class="field">
          <span>Max Price</span>
          <input id="priceRange" type="range" min="100" max="2000" step="50" value="2000" />
          <div class="muted" id="priceLabel">$2000</div>
        </label>

        <label class="check" title="Shows only items in stock">
          <input id="inStockOnly" type="checkbox" />
          <span>In stock only</span>
        </label>
      </div>

      <div class="row space">
        <p class="muted" id="resultCount" aria-live="polite"></p>
        <button class="btn" id="resetFilters" type="button">Reset filters</button>
      </div>

      <div class="grid-3" id="catalogGrid" aria-label="Product results">
        <!-- populated by app.js -->
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> Juniper &amp; Ash</p>
  </footer>

  <dialog class="modal" id="cartModal" aria-labelledby="cartTitle">
    <div class="modal-head">
      <h3 id="cartTitle">Your Cart</h3>
      <button class="icon-btn" id="closeCart" type="button" aria-label="Close cart">✕</button>
    </div>
    <div id="cartBody" class="cart"></div>
    <div class="cart-footer">
      <div class="row space">
        <strong>Total</strong>
        <strong id="cartTotal">$0.00</strong>
      </div>
      <div class="row wrap">
        <button class="btn" id="clearCart" type="button">Clear</button>
        <a class="btn primary" href="/checkout.html" aria-disabled="true" onclick="return false;">Checkout (mock)</a>
      </div>
      <p class="muted">Checkout is intentionally disabled; this is just a test site.</p>
    </div>
  </dialog>
</body>

</html>
